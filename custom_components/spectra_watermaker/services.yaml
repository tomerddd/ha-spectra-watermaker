start:
  name: Start watermaker
  description: Start the watermaker with the full boot and start sequence.
  fields:
    duration_hours:
      name: Duration
      description: Run duration in hours (0.5-8.0). Uses the configured default if omitted.
      required: false
      selector:
        number:
          min: 0.5
          max: 8.0
          step: 0.5
          unit_of_measurement: "h"
          mode: slider

stop:
  name: Stop watermaker
  description: Stop the watermaker. Triggers a freshwater flush cycle.

flush:
  name: Flush watermaker
  description: Trigger a manual freshwater flush from idle.

get_run_history:
  name: Get run history
  description: Returns the last N production runs with stats.
  fields:
    limit:
      name: Limit
      description: Number of runs to return (1-50, default 10).
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: box
